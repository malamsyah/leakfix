name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  self-scan:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install kingfisher
        # Extract OUTSIDE the workspace so the binary itself doesn't get
        # picked up by self-scan as a giant pile of false-positives.
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          curl -fsSL -o "$tmp/kingfisher.tgz" \
            "https://github.com/mongodb/kingfisher/releases/latest/download/kingfisher-linux-x64.tgz"
          tar -xzf "$tmp/kingfisher.tgz" -C "$tmp"
          sudo install -m 755 "$tmp/kingfisher" /usr/local/bin/kingfisher
          rm -rf "$tmp"
          kingfisher --version
      - name: Self-scan (no findings allowed)
        run: make self-scan
