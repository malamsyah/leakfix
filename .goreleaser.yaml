version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: leakfix
    main: ./cmd/leakfix
    binary: leakfix
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "Merge pull request"

brews:
  - name: leakfix
    repository:
      owner: malamsyah
      name: homebrew-tap
    homepage: "https://github.com/malamsyah/leakfix"
    description: "Remediation agent for Kingfisher findings."
    license: "Apache-2.0"
    dependencies:
      - name: git
